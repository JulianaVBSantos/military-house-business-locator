function buscarLoja() {
    var texto = document.getElementById('pesquisa').value.toLowerCase();
    for (let i = 0; i < marcadores.length; i++) {
        if (marcadores[i].nome.toLowerCase().includes(texto)) {
            map.setView(marcadores[i].marker.getLatLng(), 15);
            marcadores[i].marker.openPopup();
            return;
        }
    }
    alert('Loja não encontrada!');
}
